name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt pyinstaller
      - run: python -m PyInstaller --noconfirm --windowed --onefile --name FocusTracker --collect-all qfluentwidgets main.py
      - uses: actions/upload-artifact@v4
        with:
          name: FocusTracker-exe
          path: dist/FocusTracker.exe
