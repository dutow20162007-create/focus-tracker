name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt pyinstaller
      - run: python -m PyInstaller --noconfirm --windowed --onefile --name FocusTracker --collect-all qfluentwidgets --collect-all PyQt6 --hidden-import pkgutil --distpath dist-win main.py
      - name: Build installer
        run: |
          choco install nsis -y --no-progress
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ github.ref_type == 'tag' && github.ref_name || '1.0.0' }} installer.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: FocusTracker
          path: |
            dist-win/FocusTracker.exe
            FocusTrackerSetup.exe
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-win/FocusTracker.exe
            FocusTrackerSetup.exe
